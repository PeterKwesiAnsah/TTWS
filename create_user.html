<!doctype html>
<html>
    <head>
        <title>Create User</title>
    </head>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-top: 20px;
        }
        form {
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            margin: 0 auto;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        input[type="submit"] {
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
    <body>
        <h1>Create User</h1>
        <form action="/create_user" method="post">
            <label for="first_name">First Name:</label>
            <input
                type="text"
                id="first_name"
                name="first_name"
                required
            /><br />
            <label for="last_name">Last Name:</label>
            <input type="text" id="last_name" name="last_name" required /><br />
            <input type="submit" value="Create" />
        </form>
    </body>
</html>
